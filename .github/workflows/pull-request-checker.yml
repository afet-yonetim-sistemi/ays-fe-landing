# Purpose: This file is used to build the frontend project and run SonarQube analysis when a PR is updated.
name: Pull Request Checker

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - unlocked

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Initialize environment
        uses: ./.github/actions/initialize-environment
        with:
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_USER_ACCESS_TOKEN: ${{ secrets.GH_USER_ACCESS_TOKEN }}

      - name: Install and Build
        run: |
          npm install
          npm run build

  sonarqube:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Shallow clones should be disabled for a better relevancy of analysis

      - name: Initialize environment
        uses: ./.github/actions/initialize-environment
        with:
          GH_USERNAME: ${{ vars.GH_USERNAME }}
          GH_USER_ACCESS_TOKEN: ${{ secrets.GH_USER_ACCESS_TOKEN }}

      - name: SonarQube Scan
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        with:
          projectBaseDir: .
          args: >
            -Dsonar.projectKey=${{ vars.SONAR_PROJECT_KEY }}
            -Dsonar.projectName='ays-fe-landing'
